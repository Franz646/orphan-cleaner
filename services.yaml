scan:
  name: Scansiona entità orfane
  description: >
    Scansiona il registro di Home Assistant e spara l'evento
    'orphan_cleaner_orphans_found' con la lista delle entità orfane.
    Utile nelle automazioni per rilevare e notificare la presenza di entità orfane.
  fields: {}

delete_orphans:
  name: Elimina entità orfane
  description: >
    Elimina le entità orfane dal registro di Home Assistant.
    Se entity_ids è omesso, vengono eliminate tutte le orfane
    rilevate con i parametri correnti dell'integrazione.
  fields:
    entity_ids:
      name: Entity IDs
      description: >
        Lista di entity_id da eliminare. Se omessa, elimina tutte
        le entità orfane rilevate automaticamente.
      required: false
      example: "['sensor.old_device', 'binary_sensor.ghost']"
      selector:
        entity:
          multiple: true
    dry_run:
      name: Dry run
      description: >
        Se true, registra nei log le entità che verrebbero eliminate
        senza modificare nulla. Utile per verificare prima di procedere.
      required: false
      default: false
      selector:
        boolean:
